name: build-windows-exe

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller openpyxl matplotlib numpy

      - name: Build exe
        run: |
          pyinstaller --noconsole --onefile --clean --name HBTools --collect-all matplotlib --collect-all numpy main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HBTools-windows
          path: dist/HBTools.exe
